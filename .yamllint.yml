---
extends: default

rules:
  line-length:
    max: 150
    level: warning
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: true
  document-start:
    present: false
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
