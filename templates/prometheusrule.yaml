{{- if .Values.prometheusRule.enabled }}
# PrometheusRule — Prometheus Operator CRD for alert rules.
# Enable this when using kube-prometheus-stack or any Prometheus Operator.
# Set labels to match your Prometheus CR's ruleSelector.
#
# For kube-prometheus-stack, add to values.yaml:
#   prometheusRule:
#     enabled: true
#     labels:
#       release: kube-prometheus-stack
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "monitoring-pack.fullname" . }}
  namespace: {{ include "monitoring-pack.namespace" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
  {{- include "monitoring-pack.alertGroups" . | nindent 4 }}
{{- end }}
