{{- if .Values.blackboxExporter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-pack.blackbox.fullname" . }}
  namespace: {{ include "monitoring-pack.namespace" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: blackbox-exporter
data:
  blackbox.yml: |
    modules:

      # ── HTTP probes ──────────────────────────────────────────────────────────

      # Standard HTTP/HTTPS — expects 2xx response
      http_2xx:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []      # Empty = accept all 2xx
          method: GET
          follow_redirects: true
          fail_if_ssl: false
          fail_if_not_ssl: false
          preferred_ip_protocol: "ip4"
          ip_protocol_fallback: true
          tls_config:
            insecure_skip_verify: false

      # HTTP POST — expects 2xx or 201
      http_post_2xx:
        prober: http
        timeout: 15s
        http:
          method: POST
          valid_status_codes: [200, 201, 202]
          follow_redirects: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: false

      # HTTPS with TLS verification disabled — for self-signed certs
      http_2xx_no_ssl_verify:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []
          method: GET
          follow_redirects: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: true

      # SSL certificate check — fails if no TLS or cert is invalid
      ssl_expiry:
        prober: http
        timeout: 15s
        http:
          method: GET
          fail_if_not_ssl: true
          follow_redirects: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: false

      # ── TCP probes ───────────────────────────────────────────────────────────

      tcp_connect:
        prober: tcp
        timeout: 15s
        tcp:
          preferred_ip_protocol: "ip4"
          ip_protocol_fallback: true

      # TLS-wrapped TCP (e.g., secure databases)
      tcp_tls:
        prober: tcp
        timeout: 15s
        tcp:
          tls: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: false

      # ── DNS probes ───────────────────────────────────────────────────────────

      dns_check:
        prober: dns
        timeout: 15s
        dns:
          query_name: "google.com"
          query_type: "A"
          valid_rcodes:
            - NOERROR
          validate_answer_rrs:
            fail_if_not_matches_regexp:
              - ".*"

      dns_udp:
        prober: dns
        timeout: 15s
        dns:
          transport_protocol: "udp"
          query_name: "google.com"
          query_type: "A"
          valid_rcodes:
            - NOERROR

      # ── ICMP probes ──────────────────────────────────────────────────────────
      # Requires NET_RAW capability — set blackboxExporter.privileged: true

      icmp:
        prober: icmp
        timeout: 15s
        icmp:
          preferred_ip_protocol: "ip4"
          ip_protocol_fallback: true

      icmp_ttl5:
        prober: icmp
        timeout: 15s
        icmp:
          preferred_ip_protocol: "ip4"
          ttl: 5

      {{- /*
      ── Dynamic per-target authenticated HTTP modules ───────────────────────
      Targets with headers/bearerToken/basicAuth get their own module so the
      credentials are baked into the Blackbox Exporter config rather than
      needing a hand-edited ConfigMap. Base behavior mirrors http_2xx, or
      http_2xx_no_ssl_verify if that target's module is set explicitly.
      */}}
      {{- range .Values.targets }}
      {{- if include "monitoring-pack.target.hasAuth" . }}

      # Authenticated HTTP module for target "{{ .name }}"
      http-auth-{{ include "monitoring-pack.slug" .name }}:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []
          method: GET
          follow_redirects: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: {{ eq .module "http_2xx_no_ssl_verify" }}
          {{- if .headers }}
          headers:
            {{- toYaml .headers | nindent 12 }}
          {{- end }}
          {{- if .bearerToken }}
          bearer_token: {{ .bearerToken | quote }}
          {{- end }}
          {{- $basicUser := dig "basicAuth" "username" "" . }}
          {{- if $basicUser }}
          basic_auth:
            username: {{ $basicUser | quote }}
            password: {{ dig "basicAuth" "password" "" . | quote }}
          {{- end }}
      {{- end }}
      {{- end }}

      {{- /*
      ── Dynamic per-target DNS modules ──────────────────────────────────────
      blackbox_exporter's DNS prober queries "target" (a DNS server) and asks
      it to resolve a fixed "query_name" from the module config — the module
      cannot take query_name as a runtime parameter. So "does example.com
      resolve?" requires its own module (query_name: example.com) paired with
      a scrape target that points at a real resolver, not at example.com
      itself. One module is generated per entry in .Values.dnsTargets.
      */}}
      {{- range .Values.dnsTargets }}

      # Resolves "{{ .host }}" (dnsTargets["{{ .name }}"]) against a resolver
      dns-{{ include "monitoring-pack.slug" .name }}:
        prober: dns
        timeout: 15s
        dns:
          query_name: {{ .host | quote }}
          query_type: {{ default "A" .recordType | quote }}
          valid_rcodes:
            - NOERROR
      {{- end }}
{{- end }}
