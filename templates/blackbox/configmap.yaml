{{- if .Values.blackboxExporter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-pack.blackbox.fullname" . }}
  namespace: {{ include "monitoring-pack.namespace" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: blackbox-exporter
data:
  blackbox.yml: |
    modules:

      # ── HTTP probes ──────────────────────────────────────────────────────────

      # Standard HTTP/HTTPS — expects 2xx response
      http_2xx:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []      # Empty = accept all 2xx
          method: GET
          follow_redirects: true
          fail_if_ssl: false
          fail_if_not_ssl: false
          preferred_ip_protocol: "ip4"
          ip_protocol_fallback: true
          tls_config:
            insecure_skip_verify: false

      # HTTP POST — expects 2xx or 201
      http_post_2xx:
        prober: http
        timeout: 15s
        http:
          method: POST
          valid_status_codes: [200, 201, 202]
          follow_redirects: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: false

      # HTTPS with TLS verification disabled — for self-signed certs
      http_2xx_no_ssl_verify:
        prober: http
        timeout: 15s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []
          method: GET
          follow_redirects: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: true

      # SSL certificate check — fails if no TLS or cert is invalid
      ssl_expiry:
        prober: http
        timeout: 15s
        http:
          method: GET
          fail_if_not_ssl: true
          follow_redirects: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: false

      # ── TCP probes ───────────────────────────────────────────────────────────

      tcp_connect:
        prober: tcp
        timeout: 15s
        tcp:
          preferred_ip_protocol: "ip4"
          ip_protocol_fallback: true

      # TLS-wrapped TCP (e.g., secure databases)
      tcp_tls:
        prober: tcp
        timeout: 15s
        tcp:
          tls: true
          preferred_ip_protocol: "ip4"
          tls_config:
            insecure_skip_verify: false

      # ── DNS probes ───────────────────────────────────────────────────────────

      dns_check:
        prober: dns
        timeout: 15s
        dns:
          query_name: "google.com"
          query_type: "A"
          valid_rcodes:
            - NOERROR
          validate_answer_rrs:
            fail_if_not_matches_regexp:
              - ".*"

      dns_udp:
        prober: dns
        timeout: 15s
        dns:
          transport_protocol: "udp"
          query_name: "google.com"
          query_type: "A"
          valid_rcodes:
            - NOERROR

      # ── ICMP probes ──────────────────────────────────────────────────────────
      # Requires NET_RAW capability — set blackboxExporter.privileged: true

      icmp:
        prober: icmp
        timeout: 15s
        icmp:
          preferred_ip_protocol: "ip4"
          ip_protocol_fallback: true

      icmp_ttl5:
        prober: icmp
        timeout: 15s
        icmp:
          preferred_ip_protocol: "ip4"
          ttl: 5
{{- end }}
