{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "monitoring-pack.fullname" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
rules:
  # Prometheus needs to scrape pod/service/node metrics and discover endpoints
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "monitoring-pack.fullname" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "monitoring-pack.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "monitoring-pack.serviceAccountName" . }}
    namespace: {{ include "monitoring-pack.namespace" . }}
{{- end }}
