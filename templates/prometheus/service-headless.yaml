{{- if .Values.prometheus.enabled }}
# Headless service required by the StatefulSet for stable per-replica DNS
# (prometheus-0.<this>.<namespace>.svc, prometheus-1.<this>.<namespace>.svc,
# ...). Not meant for clients — use the regular ClusterIP service for queries.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-pack.prometheus.fullname" . }}-headless
  namespace: {{ include "monitoring-pack.namespace" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "monitoring-pack.prometheus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.prometheus.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
