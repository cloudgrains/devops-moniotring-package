{{- if .Values.prometheus.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "monitoring-pack.prometheus.fullname" . }}
  namespace: {{ include "monitoring-pack.namespace" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.prometheus.replicaCount }}
  serviceName: {{ include "monitoring-pack.prometheus.fullname" . }}-headless
  # Independent HA replicas don't need ordered startup/shutdown between them —
  # Parallel gets a multi-replica install ready faster than the StatefulSet
  # default (OrderedReady), which would otherwise wait for replica 0 before
  # even starting replica 1.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "monitoring-pack.prometheus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "monitoring-pack.prometheus.selectorLabels" . | nindent 8 }}
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod restart when config changes
        checksum/config: {{ include (print $.Template.BasePath "/prometheus/configmap.yaml") . | sha256sum }}
        {{- with .Values.prometheus.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "monitoring-pack.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.prometheus.podSecurityContext | nindent 8 }}
      initContainers:
        # Ensure the data directory is writable by the prometheus user (65534)
        - name: init-chown-data
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "chown -R 65534:65534 /prometheus"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /prometheus
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.prometheus.image.pullPolicy }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
            - "--storage.tsdb.retention.size={{ .Values.prometheus.retentionSize }}"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
            - "--web.enable-lifecycle"      # Allows POST /-/reload
            - "--web.enable-admin-api"
            - "--log.level=info"
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "monitoring-pack.prometheus.fullname" . }}
            items:
              - key: prometheus.yml
                path: prometheus.yml
              - key: website-alerts.yml
                path: rules/website-alerts.yml
        {{- if not .Values.prometheus.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.prometheus.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.prometheus.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.prometheus.persistence.enabled }}
  # One PVC per replica (prometheus-<n>), not one shared PVC — the previous
  # Deployment+single-PVC design couldn't safely run more than 1 replica.
  # Kept even if you scale replicas down/up or delete the StatefulSet
  # (Kubernetes' long-standing default for volumeClaimTemplates-managed PVCs
  # is to never auto-delete them, independent of any Helm annotation).
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "monitoring-pack.labels" . | nindent 10 }}
          app.kubernetes.io/component: prometheus
        annotations:
          "helm.sh/resource-policy": keep
      spec:
        accessModes:
          - {{ .Values.prometheus.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.prometheus.persistence.size }}
        {{- if .Values.prometheus.persistence.storageClass }}
        storageClassName: {{ .Values.prometheus.persistence.storageClass }}
        {{- end }}
  {{- end }}
{{- end }}
