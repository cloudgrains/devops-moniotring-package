{{- if .Values.alertmanager.enabled }}
# Headless service required by the StatefulSet for stable per-replica DNS —
# also what --cluster.peer addresses (gossip clustering) resolve against.
# Not meant for clients — use the regular ClusterIP service for the API/UI.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring-pack.alertmanager.fullname" . }}-headless
  namespace: {{ include "monitoring-pack.namespace" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "monitoring-pack.alertmanager.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.alertmanager.service.port }}
      targetPort: http
      protocol: TCP
    {{- if gt (.Values.alertmanager.replicaCount | int) 1 }}
    - name: cluster-tcp
      port: 9094
      targetPort: cluster-tcp
      protocol: TCP
    - name: cluster-udp
      port: 9094
      targetPort: cluster-udp
      protocol: UDP
    {{- end }}
{{- end }}
