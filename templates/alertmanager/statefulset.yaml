{{- if .Values.alertmanager.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "monitoring-pack.alertmanager.fullname" . }}
  namespace: {{ include "monitoring-pack.namespace" . }}
  labels:
    {{- include "monitoring-pack.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.alertmanager.replicaCount }}
  serviceName: {{ include "monitoring-pack.alertmanager.fullname" . }}-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "monitoring-pack.alertmanager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "monitoring-pack.alertmanager.selectorLabels" . | nindent 8 }}
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/alertmanager/configmap.yaml") . | sha256sum }}
        {{- with .Values.alertmanager.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "monitoring-pack.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.alertmanager.podSecurityContext | nindent 8 }}
      containers:
        - name: alertmanager
          image: "{{ .Values.alertmanager.image.repository }}:{{ .Values.alertmanager.image.tag }}"
          imagePullPolicy: {{ .Values.alertmanager.image.pullPolicy }}
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.listen-address=:9093"
            {{- if gt (.Values.alertmanager.replicaCount | int) 1 }}
            # Gossip-based HA clustering: every replica peers with every other
            # replica (including its own address, which Alertmanager no-ops on
            # harmlessly) so duplicate alerts from independent Prometheus
            # replicas get deduplicated and only one notification goes out.
            - "--cluster.listen-address=0.0.0.0:9094"
            {{- range $i := until (int .Values.alertmanager.replicaCount) }}
            - "--cluster.peer={{ include "monitoring-pack.alertmanager.fullname" $ }}-{{ $i }}.{{ include "monitoring-pack.alertmanager.fullname" $ }}-headless.{{ include "monitoring-pack.namespace" $ }}.svc:9094"
            {{- end }}
            {{- else }}
            - "--cluster.listen-address="    # Disable HA clustering (single replica)
            {{- end }}
            - "--log.level=info"
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
            {{- if gt (.Values.alertmanager.replicaCount | int) 1 }}
            - name: cluster-tcp
              containerPort: 9094
              protocol: TCP
            - name: cluster-udp
              containerPort: 9094
              protocol: UDP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.alertmanager.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: data
              mountPath: /alertmanager
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "monitoring-pack.alertmanager.fullname" . }}
        {{- if not .Values.alertmanager.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.alertmanager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.alertmanager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.alertmanager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.alertmanager.persistence.enabled }}
  # One PVC per replica — see templates/prometheus/statefulset.yaml for why
  # this is safe across upgrades, scaling, and helm uninstall.
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "monitoring-pack.labels" . | nindent 10 }}
          app.kubernetes.io/component: alertmanager
        annotations:
          "helm.sh/resource-policy": keep
      spec:
        accessModes:
          - {{ .Values.alertmanager.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.alertmanager.persistence.size }}
        {{- if .Values.alertmanager.persistence.storageClass }}
        storageClassName: {{ .Values.alertmanager.persistence.storageClass }}
        {{- end }}
  {{- end }}
{{- end }}
