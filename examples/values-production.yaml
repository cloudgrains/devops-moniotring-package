# Production values.yaml — hardened, HA-ready configuration.
# Uses dedicated StorageClass, resource limits, Ingress, and all probe types.
#
# Install:
#   helm install monitor monitoring-pack \
#     --namespace monitoring --create-namespace \
#     -f examples/values-production.yaml

# ── Targets ──────────────────────────────────────────────────────────────────
targets:
  - name: Main Website
    url: https://example.com
    interval: 30s
  - name: API
    url: https://api.example.com
    interval: 30s
  - name: Admin Panel
    url: https://admin.example.com
    interval: 60s
    module: http_2xx_no_ssl_verify   # Self-signed cert

tcpTargets:
  - name: PostgreSQL
    host: "postgres.example.com:5432"
    interval: 30s
  - name: Redis
    host: "redis.example.com:6379"
    interval: 30s

dnsTargets:
  - name: Main Domain
    host: "example.com"
    interval: 60s

icmpTargets:
  - name: Load Balancer
    host: "10.0.0.1"
    interval: 30s

# ── Alert thresholds ──────────────────────────────────────────────────────────
alerts:
  ssl:
    warningDays: 45
    criticalDays: 14
  responseTime:
    warning: 1.5
    critical: 3.0
  downFor: "1m"

# ── Notifications ─────────────────────────────────────────────────────────────
notifications:
  slack:
    enabled: true
    webhookUrl: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    channel: "#production-alerts"
    username: "Monitoring Pack"
  email:
    enabled: true
    smarthost: "smtp.gmail.com:587"
    from: "alerts@example.com"
    to: "oncall@example.com"
    username: "alerts@example.com"
    password: "your-app-password"

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  retention: "90d"
  retentionSize: "50GB"
  scrapeInterval: "30s"
  evaluationInterval: "30s"
  persistence:
    enabled: true
    storageClass: "fast-ssd"
    size: "100Gi"
  podAnnotations:
    prometheus.io/scrape: "false"

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  adminPassword: "CHANGE_ME_STRONG_PASSWORD"
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  persistence:
    enabled: true
    storageClass: "fast-ssd"
    size: "20Gi"
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    host: "grafana.example.com"
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.example.com

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    storageClass: "fast-ssd"
    size: "5Gi"
  repeatInterval: "2h"

# ── Blackbox Exporter ─────────────────────────────────────────────────────────
blackboxExporter:
  privileged: true   # Required for ICMP probes
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# ── Common labels ─────────────────────────────────────────────────────────────
commonLabels:
  env: production
  team: platform
